# Render.com deployment config for the FastAPI backend
# https://render.com/docs/render-yaml
services:
  - type: web
    name: agente-ia-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set this manually in the Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://your-app.netlify.app
